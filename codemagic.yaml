workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        FLUTTER_MIN_SDK_VERSION: "23"
    scripts:
      - name: Reset e Generazione Android
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.flolk --project-name secure_chat_app
          
          echo "Forzo la configurazione di Android compileSdk a 36..."
          cat << 'EOF' >> android/build.gradle.kts

          rootProject.extra.set("compileSdkVersion", 36)

          subprojects {
              plugins.withId("com.android.application") {
                  configure<com.android.build.gradle.BaseExtension> {
                      compileSdkVersion(36)
                  }
              }
              plugins.withId("com.android.library") {
                  configure<com.android.build.gradle.BaseExtension> {
                      compileSdkVersion(36)
                  }
              }
          }
          EOF
      - name: Generazione Icona e Nome App
        script: |
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Build APK Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
