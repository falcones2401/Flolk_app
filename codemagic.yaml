workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        FLUTTER_MIN_SDK_VERSION: "23"
    scripts:
      - name: Reset e Generazione Android Conservativa
        script: |
          # 1. Salva temporaneamente il file google-services.json se esiste
          if [ -f "android/app/google-services.json" ]; then
            echo "Salvo il file google-services.json..."
            cp android/app/google-services.json ./google-services.json.bak
          fi

          # 2. Rimuove e rigenera la cartella android usando i veri dati del pacchetto
          rm -rf android
          flutter create . --platforms=android --org com.flolk --project-name flolk
          
          # 3. Ripristina il file google-services.json nella nuova cartella
          if [ -f "./google-services.json.bak" ]; then
            echo "Ripristino il file google-services.json..."
            mkdir -p android/app
            mv ./google-services.json.bak android/app/google-services.json
          else
            echo "ATTENZIONE: google-services.json non trovato! Assicurati che sia su GitHub in android/app/"
          fi

          # 4. Applica il fix per l'errore compileSdk 36
          echo "Forzo la configurazione di Android compileSdk a 36..."
          cat << 'EOF' >> android/build.gradle.kts
          rootProject.extra.set("compileSdkVersion", 36)
          subprojects {
              plugins.withId("com.android.application") {
                  configure<com.android.build.gradle.BaseExtension> { compileSdkVersion(36) }
              }
              plugins.withId("com.android.library") {
                  configure<com.android.build.gradle.BaseExtension> { compileSdkVersion(36) }
              }
          }
          EOF
      - name: Generazione Icona e Nome App
        script: |
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Build APK Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
