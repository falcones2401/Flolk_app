workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Reset e Generazione Android
        script: |
          rm -rf android
          flutter create . --platforms=android
      - name: Modifica MinSdkVersion Nativamente
        script: |
          cd android/app
          sed -i.bak 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' build.gradle
      - name: Build APK Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
