workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Reset e Generazione Android Nativo
        script: |
          rm -rf android
          flutter create . --platforms=android
      - name: Build APK Release Forzando MinSdkVersion
        script: |
          flutter build apk --release --min-content-view=23 --target-platform android-arm,android-arm64
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
