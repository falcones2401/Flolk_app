workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        FLUTTER_MIN_SDK_VERSION: "23"
    scripts:
      - name: Generazione Android con Firebase
        script: |
          # 1. Teniamo al sicuro il google-services.json che hai caricato
          if [ -f "android/app/google-services.json" ]; then
            cp android/app/google-services.json ./google-services.json.bak
          fi

          # 2. Rimuove e rigenera la cartella android con il nome corretto
          rm -rf android
          flutter create . --platforms=android --org com.flolk --project-name flolk
          
          # 3. Rimettiamo il file Firebase al suo posto
          if [ -f "./google-services.json.bak" ]; then
            mkdir -p android/app
            mv ./google-services.json.bak android/app/google-services.json
          fi

          # === FIX CRASH FIREBASE: Iniettiamo le configurazioni Gradle native ===
          echo "Configuro Gradle per Firebase..."
          
          # Modifica android/build.gradle (Project level) per aggiungere il classpath di Google Services
          sed -i '' 's|dependencies {|dependencies {\n        classpath '"'"'com.google.gms:google-services:4.4.1'"'"'|g' android/build.gradle

          # Modifica android/app/build.gradle (App level) per applicare il plugin in fondo al file
          echo "\napply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

          # 4. Forzatura delle proprietà SDK (quella che non rompe file_picker)
          echo "Forzo le proprietà di sistema..."
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects { project ->
              def forceSdk = {
                  if (project.extensions.findByName("android") != null) {
                      project.android.compileSdkVersion = 36
                  }
              }
              if (project.state.executed) {
                  forceSdk()
              } else {
                  project.afterEvaluate {
                      forceSdk()
                  }
              }
          }
          EOF
      - name: Generazione Icona e Nome App
        script: |
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Build APK Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
