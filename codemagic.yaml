workflows:
  default-workflow:
    name: Build Android Pulita
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        FLUTTER_MIN_SDK_VERSION: "23"
    scripts:
      - name: Generazione Android con Firebase
        script: |
          # 1. Teniamo al sicuro il google-services.json che hai caricato
          if [ -f "android/app/google-services.json" ]; then
            cp android/app/google-services.json ./google-services.json.bak
          fi

          # 2. Pulizia e rigenerazione standard (quella che faceva la build verde)
          rm -rf android
          flutter create . --platforms=android --org com.flolk --project-name secure_chat_app
          
          # 3. Rimettiamo il file Firebase al suo posto
          if [ -f "./google-services.json.bak" ]; then
            mkdir -p android/app
            mv ./google-services.json.bak android/app/google-services.json
          fi

          # 4. Forzatura vecchio stile (quella che NON rompeva file_picker)
          echo "Forzo le proprietà di sistema..."
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects { project ->
              def forceSdk = {
                  if (project.extensions.findByName("android") != null) {
                      project.android.compileSdkVersion = 36
                  }
              }
              if (project.state.executed) {
                  forceSdk()
              } else {
                  project.afterEvaluate {
                      forceSdk()
                  }
              }
          }
          EOF
      - name: Generazione Icona e Nome App
        script: |
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Build APK Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
