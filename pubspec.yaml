name: secure_chat_app
description: "Flolk - Secure Chat Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core e Servizi
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.6
  firebase_auth: ^4.16.0

  # Gestione File e Immagini
  image_picker: ^1.0.7
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Pacchetto per la generazione automatica delle icone
  flutter_launcher_icons: ^0.13.1

# CONFIGURAZIONE ICONA
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # Registrazione della cartella degli asset per l'icona
  assets:
    - assets/icon/
