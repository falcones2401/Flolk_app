name: secure_chat_app
description: "Flolk - Secure Chat Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core e Servizi
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.6

  # Gestione File e Immagini (Predisposti per la chat)
  image_picker: ^1.0.7
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Se in futuro dovrai aggiungere immagini locali o font, inseriscili qui sotto
  # assets:
  #   - assets/images/
