name: secure_chat_app
description: "A secure chat application - Flolk"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icone iOS/Android standard
  cupertino_icons: ^1.0.6

  # Firebase (Configurazione stabile e testata)
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # Gestione dei File e delle Immagini (Risolto il problema del v1 embedding)
  image_picker: ^1.1.0
  file_picker: ^8.1.2

  # Formattazione date e utility
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting per la qualità del codice
  flutter_lints: ^2.0.3

  # Richiesto da Codemagic per lo Step 4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Cartella assets per l'icona dell'applicazione
  assets:
    - assets/icon/

# Configurazione specifica per la generazione dell'icona
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
