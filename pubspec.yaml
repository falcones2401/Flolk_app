name: secure_chat_app
description: "A secure chat application - Flolk"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icone iOS/Android standard
  cupertino_icons: ^1.0.6

  # Firebase Core e Firestore (Senza Storage, usi Cloudinary!)
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0

  # Gestione dei File e delle Immagini nella chat
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # Formattazione date e utility
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting per la qualità del codice
  flutter_lints: ^2.0.3

  # Pacchetto richiesto da Codemagic per lo Step 4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Definiamo la cartella assets così Flutter sa dove andare a leggere l'icona
  assets:
    - assets/icon/

# Configurazione specifica per la generazione dell'icona
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
